server {
    listen 80;
    server_name animate.crowncrew.dev;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name animate.crowncrew.dev;

    # SSL certificates (use certbot: sudo certbot --nginx -d animate.crowncrew.dev)
    ssl_certificate /etc/letsencrypt/live/animate.crowncrew.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/animate.crowncrew.dev/privkey.pem;

    # Uploaded files served directly by Nginx
    location /uploads/ {
        alias /var/www/comic-animator/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy all other requests to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }
}
